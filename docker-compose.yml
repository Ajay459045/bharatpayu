services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  mongo-init:
    image: mongo:7
    depends_on:
      - mongo
    restart: "no"
    entrypoint: ["bash", "-lc", "sleep 4 && mongosh --host mongo:27017 --eval 'rs.initiate({_id:\"rs0\",members:[{_id:0,host:\"mongo:27017\"}]})' || true"]
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
  api:
    build:
      context: .
      target: api
    env_file: .env
    depends_on:
      - mongo
      - mongo-init
      - redis
    ports:
      - "4000:4000"
  web:
    build:
      context: .
      target: web
    env_file: .env
    depends_on:
      - api
    ports:
      - "3000:3000"
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
volumes:
  mongo-data:
